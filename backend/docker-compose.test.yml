name: pdv-backend-test

services:
  postgres:
    image: postgres:18.4-alpine3.23
    environment:
      POSTGRES_DB: pdv
      POSTGRES_USER: pdv
      POSTGRES_PASSWORD: pdv
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdv -d pdv"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    tmpfs:
      - /var/lib/postgresql

  valkey:
    image: valkey/valkey:9.1.0-alpine3.23
    command:
      - valkey-server
      - --loglevel
      - warning
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    tmpfs:
      - /data
